name: CI

on: [push]

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        toolchain: [stable, beta, nightly]
        features:
          - name: "locking"
            args: "--all-features"
          - name: "no locking"
            args: "--no-default-features"
    steps:
      - name: Checkout sources
        uses: actions/checkout@v5
      - name: Install toolchain
        run: rustup update ${{ matrix.toolchain }} && rustup default ${{ matrix.toolchain }}
      - name: Cargo Check (${{ matrix.features.name }})
        run: cargo check ${{ matrix.features.args }}

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        toolchain: [stable, beta, nightly]
        features:
          - name: "locking"
            args: "--all-features -- --include-ignored"
          - name: "no locking"
            args: "--no-default-features -- --include-ignored"
    steps:
      - name: Checkout sources
        uses: actions/checkout@v5
      - name: Install toolchain
        run: rustup update ${{ matrix.toolchain }} && rustup default ${{ matrix.toolchain }}
      - name: Cargo Test (${{ matrix.features.name }})
        run: cargo test ${{ matrix.features.args }}

  lints:
    name: Lints
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v5
      - name: Install toolchain
        run: rustup update stable && rustup default stable
      - name: Cargo Fmt
        run: cargo fmt --all -- --check
      - name: Cargo Clippy (locking)
        run: cargo clippy --all-features -- -D warnings
      - name: Cargo Clippy (no-default-features)
        run: cargo clippy --no-default-features -- -D warnings
